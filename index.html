<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>نظام دعوات QR | لوحة التحكم</title>
  
 <!-- Google Fonts - جميع الخطوط العربية المتاحة -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700;800&family=Almarai:wght@400;700;800&family=Changa:wght@400;600;700;800&family=El+Messiri:wght@400;600;700&family=Harmattan:wght@400;600;700&family=Lateef:wght@400;600;700&family=Mada:wght@400;600;700;900&family=Markazi+Text:wght@400;600;700&family=Readex+Pro:wght@400;600;700&family=Scheherazade+New:wght@400;600;700&family=Noto+Kufi+Arabic:wght@400;600;700;800&family=Noto+Naskh+Arabic:wght@400;600;700&family=Baloo+Bhaijaan+2:wght@400;600;700;800&family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;600;700&family=Lalezar&family=Mirza:wght@400;600;700&family=Katibeh&family=Kufam:wght@400;600;700;900&family=Zain:wght@400;700;800&family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  
  <!-- ملف CSS منفصل -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- شاشة تسجيل الدخول -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-icon">
        <i class="fas fa-qrcode"></i>
      </div>
      <h2>دخول الإدارة</h2>
      <p class="login-subtitle">أدخل كلمة المرور للمتابعة</p>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input id="adminPasswordInput" type="password" placeholder="كلمة المرور" />
      </div>
      <button id="loginBtn" type="button">
        <i class="fas fa-arrow-left"></i> تسجيل الدخول
      </button>
      <p id="loginError"></p>
    </div>
  </div>

  <!-- المحتوى الرئيسي -->
  <div id="adminContent">
    
    <!-- الهيدر -->
    <header class="dashboard-header">
      <div class="logo-area">
        <div class="logo-icon">
          <i class="fas fa-qrcode"></i>
        </div>
        <div>
          <h1>نظام دعوات QR</h1>
          <span class="header-subtitle">لوحة التحكم</span>
        </div>
      </div>
      <div class="header-actions">
        <span id="headerEventBadge" class="event-badge"></span>
        <button class="logout-btn" type="button" onclick="logoutAdmin()">
          <i class="fas fa-sign-out-alt"></i> خروج
        </button>
      </div>
    </header>

    <main>
      
      <!-- قسم إدارة المناسبات -->
      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-calendar-alt"></i> إدارة المناسبات</h2>
        </div>
        <div class="event-tools">
          <div class="event-row">
            <div class="select-wrapper">
              <i class="fas fa-chevron-down"></i>
              <select id="eventSelect"></select>
            </div>
            <input id="newEventName" type="text" placeholder="أدخل اسم المناسبة الجديدة" />
          </div>
          <div class="event-buttons">
            <button id="addEventBtn" class="btn btn-primary" type="button">
              <i class="fas fa-plus-circle"></i> إضافة مناسبة
            </button>
            <button id="toggleEventBtn" class="btn btn-outline" type="button">
              <i class="fas fa-eye-slash"></i> إخفاء / إظهار
            </button>
          </div>
          <p id="eventStatus" class="status-message"></p>
        </div>
      </section>

      <!-- قسم إضافة ضيف -->
      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-user-plus"></i> إضافة ضيف جديد</h2>
        </div>
        <div class="form">
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input id="guestName" type="text" placeholder="اسم الضيف الكامل" />
          </div>
          <div class="input-wrapper">
            <i class="fas fa-phone"></i>
            <input id="guestPhone" type="text" placeholder="رقم الجوال" />
          </div>
          <button id="addGuestBtn" class="btn btn-primary" type="button">
            <i class="fas fa-save"></i> إضافة الضيف
          </button>
        </div>
      </section>

      <!-- قسم تصميم الدعوة -->
      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-paint-brush"></i> تصميم الدعوة</h2>
          <span class="card-badge">اسحب العناصر لتحديد المكان</span>
        </div>
        
        <div class="upload-area">
          <label for="inviteUpload" class="upload-label">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>اختر صورة التصميم</span>
          </label>
          <input id="inviteUpload" type="file" accept="image/*" />
        </div>
        
        <div class="design-controls">
          <div class="control-group">
            <label>الخط</label>
            <select id="fontFamily">
  <optgroup label="خطوط عربية حديثة">
    <option value="Cairo" selected>Cairo - القاهرة</option>
    <option value="Tajawal">Tajawal - تجوال</option>
    <option value="Almarai">Almarai - المراعي</option>
    <option value="Changa">Changa - شانغا</option>
    <option value="El Messiri">El Messiri - المسيري</option>
    <option value="Mada">Mada - مدى</option>
    <option value="Readex Pro">Readex Pro</option>
    <option value="Noto Kufi Arabic">Noto Kufi Arabic</option>
    <option value="Baloo Bhaijaan 2">Baloo Bhaijaan 2</option>
    <option value="Reem Kufi">Reem Kufi - ريم كوفي</option>
    <option value="Lalezar">Lalezar - لاله زار</option>
    <option value="Mirza">Mirza - ميرزا</option>
    <option value="Kufam">Kufam - كوفام</option>
    <option value="Zain">Zain - زين</option>
    <option value="Rubik">Rubik - روبيك</option>
  </optgroup>
  <optgroup label="خطوط عربية تقليدية">
    <option value="Harmattan">Harmattan -هرمطان</option>
    <option value="Lateef">Lateef - لطيف</option>
    <option value="Markazi Text">Markazi Text</option>
    <option value="Scheherazade New">Scheherazade New</option>
    <option value="Noto Naskh Arabic">Noto Naskh Arabic</option>
    <option value="Aref Ruqaa">Aref Ruqaa - عرف رقعة</option>
    <option value="Amiri">Amiri - أميري</option>
    <option value="Katibeh">Katibeh - كاتبه</option>
  </optgroup>
  <optgroup label="خطوط إنجليزية">
    <option value="Arial">Arial</option>
    <option value="Tahoma">Tahoma</option>
    <option value="Times New Roman">Times New Roman</option>
    <option value="Georgia">Georgia</option>
    <option value="Verdana">Verdana</option>
  </optgroup>
</select>
          </div>

          <div class="control-group">
            <label>الحجم</label>
            <input id="fontSize" type="number" value="40" min="10" max="150" />
          </div>

          <div class="control-group">
            <label>النمط</label>
            <select id="fontWeight">
              <option value="normal">عادي</option>
              <option value="bold" selected>عريض</option>
            </select>
          </div>

          <div class="control-group">
            <label>لون النص</label>
            <div class="color-picker-group">
              <input id="fontColor" type="color" value="#000000" />
              <button id="pickFontColorBtn" class="btn btn-icon" type="button" title="اختر من الصورة">
                <i class="fas fa-eyedropper"></i>
              </button>
            </div>
          </div>

          <div class="control-group">
            <label>لون QR</label>
            <div class="color-picker-group">
              <input id="qrColor" type="color" value="#000000" />
              <button id="pickQrColorBtn" class="btn btn-icon" type="button" title="اختر من الصورة">
                <i class="fas fa-eyedropper"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="editor-container">
          <div class="editor" id="editor">
            <img id="inviteImage" alt="تصميم الدعوة" />
            <div id="nameBox" class="draggable">
              <i class="fas fa-font"></i> اسم الضيف
            </div>
            <div id="qrBox" class="draggable qr-placeholder">
              <i class="fas fa-qrcode"></i>
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button id="generateBtn" class="btn btn-primary btn-lg" type="button">
            <i class="fas fa-magic"></i> توليد الدعوات
          </button>
          <button id="downloadAllBtn" class="btn btn-warning btn-lg" type="button">
            <i class="fas fa-download"></i> تحميل كل الدعوات
          </button>
        </div>
      </section>

      <!-- قسم قائمة الضيوف -->
      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-users"></i> قائمة الضيوف</h2>
          <span id="guestCount" class="card-badge">0 ضيف</span>
        </div>
        <div class="table-wrapper">
          <table>
           <thead>
  <tr>
    <th><i class="fas fa-user"></i> الاسم</th>
    <th><i class="fas fa-phone"></i> الجوال</th>
    <th><i class="fas fa-check-circle"></i> الدخول</th>
    <th><i class="fas fa-image"></i> الدعوة</th>
    <th><i class="fas fa-cog"></i> إجراءات</th>
  </tr>
</thead>
            <tbody id="guestTable"></tbody>
          </table>
        </div>
      </section>

      <!-- قسم الدعوات المولدة -->
      <section class="card" id="invitationsCard">
        <div class="card-header">
          <h2><i class="fas fa-images"></i> الدعوات المولدة</h2>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>الضيف</th>
                <th>معاينة الدعوة</th>
                <th>تحميل</th>
              </tr>
            </thead>
            <tbody id="invitationTable"></tbody>
          </table>
        </div>
      </section>

      <!-- قسم تسجيل الدخول بالمسح -->
      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-camera"></i> تسجيل الدخول بالمسح</h2>
        </div>
        <a href="https://app2-alpha-olive.vercel.app/scan.html" id="scanBtn" class="btn btn-primary btn-lg" type="button">
          <i class="fas fa-qrcode"></i> المسح الضوئي
        </a>
        <div id="reader"></div>
        <p id="scanResult"></p>
      </section>

    </main>
  </div>

  <!-- المكتبات الخارجية -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  
  <!-- ملف JavaScript منفصل -->
  <script src="js.js"></script>
</body>
</html>
