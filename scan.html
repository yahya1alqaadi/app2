<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="color-scheme" content="light dark">
  <title>مسح الدعوات | بوابة الموظف</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    :root {
      --primary: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #0f172a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --radius: 20px;
      --radius-sm: 14px;
      --radius-xs: 10px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Cairo', 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 50%, #f1f5f9 100%);
      min-height: 100vh;
      min-height: 100dvh;
      padding: 16px;
      direction: rtl;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    .container { width: 100%; max-width: 500px; position: relative; }

    .header { text-align: center; margin-bottom: 1.2rem; position: relative; }

    .header-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 0.8rem;
      font-size: 1.6rem; color: white;
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.25);
    }

    .header h1 { font-size: 1.4rem; font-weight: 800; color: var(--dark); margin-bottom: 0.1rem; }
    .header .subtitle { color: var(--gray-500); font-size: 0.85rem; font-weight: 500; }

    /* زر Dark Mode */
    #darkModeToggle {
      position: absolute;
      top: 0;
      left: 0;
      background: #334155;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.2s;
      z-index: 10;
    }

    .card {
      background: white; padding: 1.5rem 1.2rem;
      border-radius: var(--radius);
      box-shadow: 0 15px 40px -10px rgba(0,0,0,0.08);
      border: 1px solid var(--gray-100);
    }

    .select-group { margin-bottom: 1rem; }
    .select-group label {
      display: block; font-weight: 700; color: var(--gray-700);
      margin-bottom: 0.4rem; font-size: 0.9rem;
      display: flex; align-items: center; gap: 6px;
    }
    .select-group label i { color: var(--primary); font-size: 0.9rem; }

    .select-wrapper { position: relative; }
    .select-wrapper i {
      position: absolute; top: 50%; left: 14px;
      transform: translateY(-50%); color: var(--gray-400);
      pointer-events: none; font-size: 0.8rem;
    }

    select {
      width: 100%; padding: 0.85rem 1rem; font-size: 0.95rem;
      border-radius: var(--radius-xs); border: 2px solid var(--gray-200);
      background: white; font-family: inherit; appearance: none;
      cursor: pointer; transition: all 0.2s; color: var(--dark);
      padding-left: 2.5rem;
    }
    select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,0.08); }

    .btn {
      width: 100%; padding: 0.9rem; font-size: 1rem; font-weight: 700;
      border: none; border-radius: var(--radius-xs); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s; font-family: inherit;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--dark); color: white; margin-bottom: 0.8rem; }
    .btn-primary:hover { background: #1e293b; }
    .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }
    .btn-success { background: var(--success); color: white; margin-bottom: 0.8rem; }

    #reader {
      width: 100%; margin-top: 8px; border-radius: var(--radius-xs);
      overflow: hidden; border: 3px solid var(--gray-200); background: #000;
    }

    .result-box {
      text-align: center; padding: 1rem; margin-top: 0.8rem;
      border-radius: var(--radius-xs); transition: all 0.3s;
      min-height: 50px; display: flex; align-items: center; justify-content: center;
    }
    #scanResult { font-size: 1.1rem; font-weight: 800; line-height: 1.5; }

    .stats-row { display: flex; gap: 8px; margin-top: 0.6rem; }
    .stat-card {
      flex: 1; background: var(--gray-50); padding: 0.8rem;
      border-radius: var(--radius-xs); text-align: center; border: 1px solid var(--gray-100);
    }
    .stat-card .stat-number { font-size: 1.5rem; font-weight: 800; color: var(--primary); line-height: 1.1; }
    .stat-card .stat-label { font-size: 0.72rem; color: var(--gray-500); font-weight: 600; margin-top: 2px; }

    .footer { text-align: center; margin-top: 1.2rem; color: var(--gray-400); font-size: 0.75rem; }
    .footer i { color: var(--danger); margin: 0 2px; }

    /* Toast Notifications */
    #toastContainer {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 99999; display: none;
      pointer-events: none;
    }

    @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes bounce { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

    #reader__dashboard_section { display: none !important; }

    @media (max-width: 380px) {
      body { padding: 10px; }
      .card { padding: 1.2rem 0.9rem; }
      .header h1 { font-size: 1.2rem; }
      #scanResult { font-size: 0.95rem; }
      .btn { font-size: 0.9rem; padding: 0.8rem; }
    }

    /* ============================================
       Dark Mode
       ============================================ */
    body.dark-mode {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    }

    body.dark-mode .card {
      background: #1e293b;
      border-color: #334155;
      box-shadow: 0 15px 40px -10px rgba(0,0,0,0.4);
    }

    body.dark-mode .header h1 { color: #f1f5f9; }
    body.dark-mode .header .subtitle { color: #94a3b8; }
    body.dark-mode .select-group label { color: #cbd5e1; }

    body.dark-mode select {
      background: #334155;
      border-color: #475569;
      color: #e2e8f0;
    }

    body.dark-mode select:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
    }

    body.dark-mode .btn-primary {
      background: #3b82f6;
    }
    body.dark-mode .btn-primary:hover {
      background: #2563eb;
    }
    body.dark-mode .btn-primary:disabled {
      background: #475569;
    }

    body.dark-mode .result-box { background: transparent; }

    body.dark-mode .stat-card {
      background: #334155;
      border-color: #475569;
    }

    body.dark-mode .stat-card .stat-number { color: #60a5fa; }
    body.dark-mode .stat-card .stat-label { color: #94a3b8; }

    body.dark-mode #reader { border-color: #475569; }
    body.dark-mode .footer { color: #64748b; }

    body.dark-mode #darkModeToggle {
      background: #475569;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="header-icon"><i class="fas fa-qrcode"></i></div>
      <h1>مسح الدعوات</h1>
      <p class="subtitle">بوابة تسجيل دخول الضيوف</p>
      <button id="darkModeToggle" title="تبديل الوضع الليلي">
        <i class="fas fa-moon"></i>
      </button>
    </div>

    <div class="card">
      <div class="select-group">
        <label><i class="fas fa-calendar-alt"></i> اختر المناسبة</label>
        <div class="select-wrapper">
          <i class="fas fa-chevron-down"></i>
          <select id="eventSelect"></select>
        </div>
      </div>

      <button id="scanBtn" type="button" class="btn btn-primary">
        <i class="fas fa-camera"></i> تشغيل الكاميرا
      </button>

      <div id="reader"></div>

      <div class="result-box" id="resultBox">
        <p id="scanResult">⏳ جاري تحميل المناسبات...</p>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-number" id="totalGuests">0</div>
          <div class="stat-label">إجمالي الضيوف</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="checkedInCount">—</div>
          <div class="stat-label">تم تسجيلهم</div>
        </div>
      </div>
    </div>

    <div class="footer">صنع بـ <i class="fas fa-heart"></i> نظام دعوات QR</div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5mMSGr3cizcvh8U3pJfkwynCI9fe7DziZ7PWrFqndc6KlfKtBz6l1kQhY5CniI12MQA/exec";
let events = [], guests = [];
let currentEventId = "";
let scanner = null, paused = false;

// ✅ قراءة eventId من الرابط
const urlParams = new URLSearchParams(window.location.search);
const linkEventId = urlParams.get("event");

const eventSelect = document.getElementById("eventSelect");
const scanBtn = document.getElementById("scanBtn");
const scanResult = document.getElementById("scanResult");
const resultBox = document.getElementById("resultBox");
const totalGuestsEl = document.getElementById("totalGuests");
const checkedInCountEl = document.getElementById("checkedInCount");
const toastContainer = document.getElementById("toastContainer");

// ========== Toast Notification ==========
function showToast(message, type = 'success', duration = 4000) {
  const colors = {
    success: { bg: 'rgba(16, 185, 129, 0.97)', icon: '✅', border: '#059669' },
    error: { bg: 'rgba(239, 68, 68, 0.97)', icon: '❌', border: '#dc2626' },
    warning: { bg: 'rgba(245, 158, 11, 0.97)', icon: '⚠️', border: '#d97706' },
    info: { bg: 'rgba(59, 130, 246, 0.97)', icon: 'ℹ️', border: '#2563eb' }
  };
  const color = colors[type] || colors.info;
  toastContainer.innerHTML = '';
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;pointer-events:auto;animation:fadeInOverlay 0.3s ease;';
  const card = document.createElement('div');
  card.style.cssText = 'background:' + color.bg + ';color:white;padding:50px 35px;border-radius:28px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,0.5);border:4px solid ' + color.border + ';max-width:480px;width:92%;animation:scaleIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);direction:rtl;font-family:Cairo,Tajawal,sans-serif;';
  card.innerHTML = '<div style="font-size:5rem;margin-bottom:15px;animation:bounce 0.7s ease;">' + color.icon + '</div><div style="font-size:2rem;font-weight:800;margin-bottom:12px;line-height:1.4;">' + message + '</div><div style="margin-top:20px;font-size:0.9rem;opacity:0.7;">سيتم الإغلاق تلقائياً...</div>';
  overlay.appendChild(card);
  toastContainer.appendChild(overlay);
  toastContainer.style.display = 'block';
  document.body.style.overflow = 'hidden';
  setTimeout(() => {
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.3s ease';
    setTimeout(() => { toastContainer.style.display = 'none'; toastContainer.innerHTML = ''; document.body.style.overflow = ''; }, 300);
  }, duration);
}

function callScript(params) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 999999);
    params.callback = cb;
    const q = new URLSearchParams(params).toString();
    const s = document.createElement("script");
    window[cb] = d => { resolve(d); delete window[cb]; s.remove(); };
    s.onerror = () => { reject(); delete window[cb]; s.remove(); };
    s.src = SCRIPT_URL + "?" + q;
    document.body.appendChild(s);
  });
}

async function loadEvents() {
  try {
    const data = await callScript({ action: "events" });
    if (data.status !== "success") { showError("❌ فشل تحميل المناسبات"); return; }
    events = data.events || [];
    
   // ✅ التحقق من صلاحية المشرف
const isAdmin = urlParams.get("admin") === "yes";

// ✅ إذا فيه eventId في الرابط
if (linkEventId) {
  const found = events.find(e => String(e.eventId) === String(linkEventId));
  if (found) {
    currentEventId = linkEventId;
    
    if (isAdmin) {
      // المشرف: يظهر له قائمة المناسبات ويقدر يبدل
      document.querySelector(".select-group").style.display = "";
      renderEventSelect();
      document.querySelector(".header .subtitle").textContent = "وضع المشرف - " + found.eventName;
    } else {
      // الموظف: ما يشوف قائمة المناسبات
      document.querySelector(".select-group").style.display = "none";
      document.querySelector(".header .subtitle").textContent = found.eventName;
    }
    
    await loadGuests();
    return;
  } else {
    showError("❌ المناسبة غير موجودة");
    return;
  }
}

// ✅ إذا ما فيه eventId (الطريقة القديمة - تلقائياً مشرف)
if (!linkEventId) {
  document.querySelector(".header .subtitle").textContent = "وضع المشرف - جميع المناسبات";
}
    
    // ✅ إذا ما فيه eventId في الرابط (الطريقة القديمة)
    if (events.length === 0) {
      eventSelect.innerHTML = '<option value="">لا توجد مناسبات</option>';
      showWarning("⚠️ لا توجد مناسبات ظاهرة");
      return;
    }
    
    currentEventId = localStorage.getItem("scanCurrentEventId") || events[0].eventId;
    renderEventSelect();
    await loadGuests();
  } catch (e) { showError("❌ فشل الاتصال"); }
}

function renderEventSelect() {
  eventSelect.innerHTML = "";
  events.forEach(ev => {
    const opt = document.createElement("option");
    opt.value = ev.eventId;
    opt.textContent = '📌 ' + ev.eventName;
    if (String(ev.eventId) === String(currentEventId)) opt.selected = true;
    eventSelect.appendChild(opt);
  });
}

async function loadGuests() {
  if (!currentEventId) { showWarning("⚠️ اختر مناسبة"); return; }
  showLoading("⏳ جاري تحميل بيانات الضيوف...");
  try {
    const data = await callScript({ action: "guests", eventId: currentEventId });
    if (data.status !== "success") { showError("❌ فشل التحميل"); return; }
    guests = data.guests || [];
    const checkedIn = guests.filter(g => g.checkedIn || g.scanCount > 0).length;
    showSuccess("✅ جاهز للمسح");
    totalGuestsEl.textContent = guests.length;
    checkedInCountEl.textContent = checkedIn;
  } catch (e) { showError("❌ فشل الاتصال"); }
}

function parseQrText(text) {
  const v = String(text || "").trim();
  if (v.includes("|")) { const p = v.split("|"); return { eventId: p[0], guestId: p[1] }; }
  return { eventId: currentEventId, guestId: v };
}

function startScanner() {
  if (!currentEventId) { showToast("⚠️ اختر مناسبة أولاً", "warning", 2500); return; }
  if (scanner) { showToast("⚠️ الكاميرا تعمل بالفعل", "warning", 2500); return; }

  scanBtn.disabled = true;
  scanBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التشغيل...';
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 30, qrbox: { width: 200, height: 200 } },
    qrText => {
      if (paused) return;
      paused = true;
      checkGuest(qrText);
      setTimeout(() => { paused = false; }, 4500);
    },
    () => {}
  ).then(() => {
    scanBtn.innerHTML = '<i class="fas fa-check-circle"></i> الكاميرا تعمل';
    scanBtn.className = 'btn btn-success';
    showSuccess("✅ الكاميرا تعمل – وجهها على QR");
  }).catch(() => {
    showError("❌ لم يتم تشغيل الكاميرا");
    scanBtn.disabled = false;
    scanBtn.innerHTML = '<i class="fas fa-camera"></i> تشغيل الكاميرا';
    scanBtn.className = 'btn btn-primary';
    scanner = null;
  });
}

async function checkGuest(qrText) {
  var parsed = parseQrText(qrText);
  if (String(parsed.eventId) !== String(currentEventId)) {
    showToast("❌ هذا QR تابع لمناسبة أخرى", "error", 3500);
    showError("❌ QR تابع لمناسبة أخرى");
    playErrorSound(); return;
  }
  var guest = guests.find(function(g) { return String(g.id) === String(parsed.guestId); });
  if (!guest) {
    showToast("❌ QR غير معروف", "error", 3500);
    showError("❌ QR غير معروف"); playErrorSound(); return;
  }
  var maxScans = guest.maxScans || 1;
  var currentScans = guest.scanCount || 0;
  if (currentScans >= maxScans) {
    showToast("🚫 " + guest.name + " استنفذ الحد الأقصى (" + maxScans + "/" + maxScans + ")", "error", 4000);
    showError("🚫 " + guest.name + " منتهي (" + maxScans + "/" + maxScans + ")");
    playErrorSound(); return;
  }
  var time = new Date().toLocaleString("ar-SA", { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });
  try {
    var data = await callScript({ action: "attendance", eventId: currentEventId, id: guest.id, name: guest.name, phone: guest.phone, time: time });
    if (data.status === "success") {
      await loadGuests();
      var updatedGuest = guests.find(function(g) { return String(g.id) === String(guest.id); });
      var newCount = updatedGuest ? (updatedGuest.scanCount || 0) : (currentScans + 1);
      var remaining = maxScans - newCount;
      
      // ✅ دائماً أخضر ما دامت العملية نجحت
      if (maxScans === 1) {
        showToast("✅ أهلاً وسهلاً " + guest.name + " (1/1)", "success", 4000);
        showSuccess("✅ مرحباً " + guest.name + " (1/1)");
      } else if (remaining > 0) {
        showToast("✅ " + guest.name + " (" + newCount + "/" + maxScans + ") متبقي " + remaining, "success", 4000);
        showSuccess("✅ " + guest.name + " (" + newCount + "/" + maxScans + ")");
      } else {
        // آخر مسحة (اكتمل)
        showToast("✅ " + guest.name + " اكتمل (" + maxScans + "/" + maxScans + ")", "success", 4000);
        showSuccess("✅ " + guest.name + " اكتمل (" + maxScans + "/" + maxScans + ")");
      }
      playSuccessSound();
      return;
    }
    showToast("❌ خطأ في التسجيل", "error", 3500);
    playErrorSound();
  } catch (e) {
    showToast("❌ فشل الاتصال", "error", 3500);
    playErrorSound();
  }
}

function playSuccessSound() { try { new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play().catch(()=>{}); } catch(e){} }
function playErrorSound() { try { new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg").play().catch(()=>{}); } catch(e){} }

function showSuccess(m) { scanResult.textContent = m; scanResult.style.color = "#065f46"; resultBox.style.background = "#d1fae5"; }
function showError(m) { scanResult.textContent = m; scanResult.style.color = "#991b1b"; resultBox.style.background = "#fee2e2"; }
function showWarning(m) { scanResult.textContent = m; scanResult.style.color = "#92400e"; resultBox.style.background = "#fef3c7"; }
function showLoading(m) { scanResult.textContent = m; scanResult.style.color = "#1e40af"; resultBox.style.background = "#dbeafe"; }

// ✅ تغيير المناسبة (فقط إذا ما فيه eventId في الرابط)
if (!linkEventId) {
  eventSelect.onchange = async function() {
    currentEventId = eventSelect.value;
    localStorage.setItem("scanCurrentEventId", currentEventId);
    await loadGuests();
    if (scanner) {
      paused = true;
      showToast("🔄 تم تغيير المناسبة", "info", 2000);
      setTimeout(function() { paused = false; }, 2500);
    }
  };
}

scanBtn.onclick = startScanner;

// ========== Dark Mode Toggle ==========
(function() {
  if (localStorage.getItem("scanDarkMode") === "enabled") {
    document.body.classList.add("dark-mode");
  }
  var darkBtn = document.getElementById("darkModeToggle");
  if (!darkBtn) return;
  updateIcon();
  darkBtn.addEventListener("click", function() {
    document.body.classList.toggle("dark-mode");
    localStorage.setItem("scanDarkMode", document.body.classList.contains("dark-mode") ? "enabled" : "disabled");
    updateIcon();
  });
  function updateIcon() {
    if (document.body.classList.contains("dark-mode")) {
      darkBtn.innerHTML = '<i class="fas fa-sun"></i>';
      darkBtn.title = "الوضع الفاتح";
    } else {
      darkBtn.innerHTML = '<i class="fas fa-moon"></i>';
      darkBtn.title = "الوضع الليلي";
    }
  }
})();

loadEvents();  </script>
</body>
</html>
