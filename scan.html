<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مسح الدعوات</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
      direction: rtl;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
    }

    select {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: 0;
      border-radius: 10px;
      background: #111827;
      color: white;
      cursor: pointer;
      margin-top: 8px;
    }

    #reader {
      margin-top: 15px;
    }

    #scanResult {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-top: 15px;
    }

    #countBox {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>مسح الدعوات</h1>

    <label>اختر المناسبة</label>
    <select id="eventSelect"></select>

    <button id="scanBtn" type="button">تشغيل الكاميرا</button>

    <div id="reader"></div>

    <p id="scanResult">جاري تحميل المناسبات...</p>
    <p id="countBox">عدد الضيوف: 0</p>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5mMSGr3cizcvh8U3pJfkwynCI9fe7DziZ7PWrFqndc6KlfKtBz6l1kQhY5CniI12MQA/exec";

    let events = [];
    let guests = [];
    let currentEventId = localStorage.getItem("scanCurrentEventId") || "";
    let scanner = null;
    let paused = false;

    const eventSelect = document.getElementById("eventSelect");
    const scanBtn = document.getElementById("scanBtn");
    const scanResult = document.getElementById("scanResult");
    const countBox = document.getElementById("countBox");

    function callScript(params) {
      return new Promise((resolve, reject) => {
        const callbackName = "callback_" + Date.now() + "_" + Math.floor(Math.random() * 999999);

        params.callback = callbackName;

        const query = new URLSearchParams(params).toString();
        const script = document.createElement("script");

        window[callbackName] = function (data) {
          resolve(data);
          delete window[callbackName];
          script.remove();
        };

        script.onerror = function () {
          reject();
          delete window[callbackName];
          script.remove();
        };

        script.src = SCRIPT_URL + "?" + query;
        document.body.appendChild(script);
      });
    }

    async function loadEvents() {
      try {
        const data = await callScript({
          action: "events"
        });

        if (data.status !== "success") {
          scanResult.textContent = "فشل تحميل المناسبات ❌";
          scanResult.style.color = "red";
          return;
        }

        events = data.events || [];

        if (events.length === 0) {
          eventSelect.innerHTML = `<option value="">لا توجد مناسبات مفعلة</option>`;
          scanResult.textContent = "لا توجد مناسبات ظاهرة للموظف";
          scanResult.style.color = "red";
          return;
        }

        if (!currentEventId || !events.find(e => String(e.eventId) === String(currentEventId))) {
          currentEventId = events[0].eventId;
          localStorage.setItem("scanCurrentEventId", currentEventId);
        }

        renderEventSelect();
        await loadGuests();

      } catch (error) {
        scanResult.textContent = "فشل تحميل المناسبات ❌";
        scanResult.style.color = "red";
      }
    }

    function renderEventSelect() {
      eventSelect.innerHTML = "";

      events.forEach(event => {
        const option = document.createElement("option");
        option.value = event.eventId;
        option.textContent = event.eventName;

        if (String(event.eventId) === String(currentEventId)) {
          option.selected = true;
        }

        eventSelect.appendChild(option);
      });
    }

    async function loadGuests() {
      if (!currentEventId) {
        scanResult.textContent = "اختر مناسبة أولاً";
        scanResult.style.color = "red";
        return;
      }

      scanResult.textContent = "جاري تحميل بيانات الضيوف...";
      scanResult.style.color = "#111827";

      try {
        const data = await callScript({
          action: "guests",
          eventId: currentEventId
        });

        if (data.status !== "success") {
          scanResult.textContent = "فشل تحميل بيانات الضيوف ❌";
          scanResult.style.color = "red";
          return;
        }

        guests = data.guests || [];

        scanResult.textContent = "جاهز للمسح ✅";
        scanResult.style.color = "green";
        countBox.textContent = "عدد الضيوف: " + guests.length;

      } catch (error) {
        scanResult.textContent = "فشل تحميل بيانات الضيوف ❌";
        scanResult.style.color = "red";
      }
    }

    function parseQrText(text) {
      const value = String(text || "").trim();

      if (value.includes("|")) {
        const parts = value.split("|");

        return {
          eventId: parts[0],
          guestId: parts[1]
        };
      }

      return {
        eventId: currentEventId,
        guestId: value
      };
    }

    function startScanner() {
      if (!currentEventId) {
        scanResult.textContent = "اختر مناسبة أولاً";
        scanResult.style.color = "red";
        return;
      }

      if (scanner) {
        scanResult.textContent = "الكاميرا تعمل بالفعل";
        return;
      }

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qrText => {
          if (paused) return;

          paused = true;
          checkGuest(qrText);

          setTimeout(() => {
            paused = false;
          }, 3000);
        },
        error => {}
      ).catch(() => {
        scanResult.textContent = "لم يتم تشغيل الكاميرا ❌";
        scanResult.style.color = "red";
        scanner = null;
      });
    }

    async function checkGuest(qrText) {
      const parsed = parseQrText(qrText);

      if (String(parsed.eventId) !== String(currentEventId)) {
        scanResult.textContent = "QR تابع لمناسبة أخرى ❌";
        scanResult.style.color = "red";
        playErrorSound();
        return;
      }

      const guest = guests.find(g => String(g.id) === String(parsed.guestId));

      if (!guest) {
        scanResult.textContent = "QR غير معروف لهذه المناسبة ❌";
        scanResult.style.color = "red";
        playErrorSound();
        return;
      }

      const time = new Date().toLocaleString("ar-SA");

      try {
        const data = await callScript({
          action: "attendance",
          eventId: currentEventId,
          id: guest.id,
          name: guest.name,
          phone: guest.phone,
          time: time
        });

        if (data.status === "duplicate") {
          scanResult.textContent = "مكرر ❌ " + guest.name + " تم تسجيله مسبقًا";
          scanResult.style.color = "red";
          playErrorSound();
          return;
        }

        if (data.status === "success") {
          scanResult.textContent = "تم تسجيل دخول " + guest.name + " ✅";
          scanResult.style.color = "green";
          playSuccessSound();
          await loadGuests();
          return;
        }

        scanResult.textContent = "حدث خطأ أثناء التسجيل ❌";
        scanResult.style.color = "red";
        playErrorSound();

      } catch (error) {
        scanResult.textContent = "فشل الاتصال بالشيت ❌";
        scanResult.style.color = "red";
        playErrorSound();
      }
    }

    function playSuccessSound() {
      const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
      audio.play();
    }

    function playErrorSound() {
      const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");
      audio.play();
    }

    eventSelect.onchange = async function () {
      currentEventId = eventSelect.value;
      localStorage.setItem("scanCurrentEventId", currentEventId);
      await loadGuests();
    };

    scanBtn.onclick = startScanner;

    loadEvents();
  </script>

</body>
</html>
